<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE-LAX Producto</title>

<link rel="stylesheet" href="styles.css">

<style>

/* ===== BODY PRODUCTO ===== */
body.producto-page{
  margin:0;
  min-height:100vh;
  background:url("img/fondo-producto.jpg") center/cover no-repeat fixed;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  font-family:'Poppins', sans-serif;
  overflow:hidden;
  color:white;
}

/* Overlay */
body.producto-page::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:0;
}

/* CONTENEDOR CENTRAL */
.producto-container{
  position:relative;
  z-index:2;
  width:100%;
  max-width:460px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ===== CUADRO AZUL (IMAGEN) ===== */
.cuadro-azul{
  width:100%;
  padding:25px;
  border-radius:25px;
  border:3px solid #00f0ff;
  box-shadow:0 0 40px #00f0ff;
  background:rgba(0,0,0,0.65);
  margin-bottom:20px;
}

.cuadro-azul img{
  width:100%;
  max-height:320px;
  object-fit:contain;
  display:block;
}

/* ===== CUADRO VERDE (INFO) ===== */
.cuadro-verde{
  width:100%;
  padding:25px;
  border-radius:25px;
  border:3px solid #00ff88;
  box-shadow:0 0 40px #00ff88;
  background:rgba(0,0,0,0.7);
  margin-bottom:20px;
  text-align:center;
}

.cuadro-verde h1{
  font-size:26px;
  color:#00f0ff;
  text-shadow:0 0 15px #00f0ff;
  margin-bottom:10px;
}

.cuadro-verde p{
  font-size:14px;
  opacity:0.9;
}

.cuadro-verde h2{
  font-size:32px;
  color:#00ffcc;
  text-shadow:0 0 20px #00ffcc;
  margin-top:15px;
}

/* ===== CUADRO FUCSIA (BOTÓN) ===== */
.tarima{
  width:100%;
  padding:20px;
  border-radius:25px;
  border:3px solid #ff00ff;
  box-shadow:0 0 50px #ff00ff;
  background:rgba(0,0,0,0.7);
  text-align:center;
  margin-bottom:15px;
}

.btn-pedir{
  display:inline-block;
  padding:14px 50px;
  background:#00eaff;
  color:black;
  font-weight:bold;
  border-radius:40px;
  text-decoration:none;
  font-size:16px;
  transition:0.3s;
}

.btn-pedir:hover{
  transform:scale(1.05);
}

/* ENTREGA */
.entrega-info{
  font-size:14px;
  text-align:center;
  text-shadow:0 0 10px #00f0ff;
}

/* Botón atrás */
.btn-back{
  position:absolute;
  top:20px;
  left:20px;
  border:2px solid #00f0ff;
  color:#00f0ff;
  padding:8px 18px;
  text-decoration:none;
  border-radius:25px;
  z-index:3;
}

</style>
</head>

<body class="producto-page">

<a href="index.html" class="btn-back">⬅ ATRÁS</a>

<div class="producto-container">

  <!-- CUADRO AZUL -->
  <div class="cuadro-azul">
    <img id="producto-imagen" alt="Producto RE-LAX">
  </div>

  <!-- CUADRO VERDE -->
  <div class="cuadro-verde">
    <h1 id="producto-nombre"></h1>
    <p id="producto-descripcion"></p>
    <h2 id="producto-precio"></h2>
  </div>

  <!-- CUADRO FUCSIA -->
  <div class="tarima">
    <a id="btn-whatsapp" target="_blank" class="btn-pedir">
      PEDIR AHORA
    </a>
  </div>

  <div class="entrega-info">
    🚀 Entrega Express<br>
    💵 Pago Contraentrega
  </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
