<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE-LAX Producto</title>

<link rel="stylesheet" href="styles.css">

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:url("img/fondo-producto.jpg") center/cover no-repeat fixed;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
}

/* Oscurecer fondo */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

.producto-container{
  width:90%;
  max-width:450px;
  text-align:center;
}

/* 🔵 CUADRO AZUL - IMAGEN */
.producto-img-box{
  background:rgba(0, 180, 255, 0.15);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:25px;
  border:1px solid rgba(0,255,255,0.4);
  margin-bottom:20px;
}

.producto-img-box img{
  width:100%;
  max-width:260px;
  border-radius:20px;
  box-shadow:0 0 25px #00f0ff;
}

/* 🟢 CUADRO VERDE - INFO */
.producto-info{
  background:rgba(0,255,120,0.15);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:25px;
  border:1px solid rgba(0,255,150,0.4);
  margin-bottom:20px;
}

.producto-info h1{
  margin:0 0 10px 0;
  font-size:24px;
  color:#00ffcc;
}

.producto-info p{
  font-size:15px;
  margin-bottom:10px;
}

.producto-info h2{
  margin:0;
  font-size:26px;
  color:#ffffff;
}

/* 🟣 CUADRO FUCSIA - BOTÓN */
.pedir-box{
  background:rgba(255,0,150,0.15);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:25px;
  border:1px solid rgba(255,0,200,0.4);
  margin-bottom:15px;
}

.btn-pedir{
  display:inline-block;
  padding:14px 40px;
  border-radius:30px;
  background:linear-gradient(90deg,#ff00cc,#ff0099);
  color:white;
  font-weight:bold;
  text-decoration:none;
  font-size:16px;
  box-shadow:0 0 20px #ff00cc;
  transition:0.3s;
}

.btn-pedir:hover{
  transform:scale(1.05);
  box-shadow:0 0 35px #ff00cc;
}

/* Entrega y pago */
.beneficios{
  font-weight:bold;
  font-size:14px;
  opacity:0.9;
}

/* Botón atrás */
.btn-back{
  position:fixed;
  top:20px;
  left:20px;
  background:#00f0ff;
  color:black;
  padding:8px 15px;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<a href="index.html" class="btn-back">⬅ ATRÁS</a>

<div class="producto-container">

  <!-- 🔵 IMAGEN -->
  <div class="producto-img-box">
    <img id="producto-imagen">
  </div>

  <!-- 🟢 INFO -->
  <div class="producto-info">
    <h1 id="producto-nombre"></h1>
    <p id="producto-descripcion"></p>
    <h2 id="producto-precio"></h2>
  </div>

  <!-- 🟣 PEDIR -->
  <div class="pedir-box">
    <a id="btn-whatsapp" target="_blank" class="btn-pedir">
      PEDIR AHORA
    </a>
  </div>

  <!-- BENEFICIOS -->
  <p class="beneficios">
    🚀 Entrega Express <br>
    💵 Pago Contraentrega
  </p>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
