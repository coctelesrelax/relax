<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE-LAX Producto</title>

<link rel="stylesheet" href="styles.css">

<style>

/* ===== ACTIVA MODO PRODUCTO ===== */
body.producto-page{
  margin:0;
  min-height:100vh;
  background:url("img/fondo-producto.jpg") center/cover no-repeat fixed;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  overflow:hidden;
  color:white;
}

/* Overlay oscuro elegante */
body.producto-page::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:0;
}

/* CONTENEDOR PERFECTAMENTE CENTRADO */
.producto-container{
  position:relative;
  z-index:2;
  width:90%;
  max-width:420px;
  text-align:center;
}

/* Imagen */
.producto-img-container{
  height:360px;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:15px;
}

.producto-img-container img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

/* Info */
.producto-info h1{
  font-size:28px;
  color:#00f0ff;
  text-shadow:0 0 15px #00f0ff;
  margin:5px 0;
}

.producto-info p{
  font-size:14px;
  opacity:0.9;
  margin:5px 0;
}

.producto-info h2{
  font-size:34px;
  color:#00ffcc;
  text-shadow:0 0 20px #00ffcc;
  margin:10px 0 15px 0;
}

/* Botón */
.btn-pedir{
  display:inline-block;
  padding:14px 45px;
  background:linear-gradient(90deg,#ff00ff,#00f0ff);
  color:white;
  font-weight:bold;
  text-decoration:none;
  border-radius:50px;
  transition:0.3s;
  box-shadow:0 0 25px #ff00ff;
  margin-top:10px;
}

.btn-pedir:hover{
  transform:scale(1.05);
  box-shadow:0 0 40px #00f0ff;
}

/* Beneficios */
.beneficios{
  margin-top:12px;
  font-size:14px;
  text-shadow:0 0 10px #00f0ff;
}

/* Botón volver */
.btn-back{
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  text-decoration:none;
  border:1px solid #00f0ff;
  padding:8px 20px;
  border-radius:20px;
  z-index:3;
}

</style>
</head>

<body class="producto-page">

<a href="index.html" class="btn-back">⬅ ATRÁS</a>

<div class="producto-container">

  <div class="producto-img-container">
    <img id="producto-imagen" alt="Producto RE-LAX">
  </div>

  <div class="producto-info">
    <h1 id="producto-nombre"></h1>
    <p id="producto-descripcion"></p>
    <h2 id="producto-precio"></h2>
  </div>

  <a id="btn-whatsapp" target="_blank" class="btn-pedir">
    PEDIR AHORA
  </a>

  <div class="beneficios">
    🚀 Entrega Express<br>
    💵 Pago Contraentrega
  </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
