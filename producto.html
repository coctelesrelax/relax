<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE-LAX Producto</title>

<link rel="stylesheet" href="styles.css">

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:url("img/fondo-producto.jpg") center/cover no-repeat fixed;
  position:relative;
  overflow:hidden;
  min-height:100vh;
  color:white;
  text-align:center;
}

/* OSCURECER FONDO */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.producto-container{
  width:100%;
  max-width:450px;
  margin:auto;
  position:relative;
}

/* ===== POSICIONAR IMAGEN EN CUADRO AZUL ===== */
.producto-img-container{
  position:absolute;
  top:12%; /* Ajusta aquí para ubicar en tu cuadro azul */
  left:50%;
  transform:translateX(-50%);
  width:260px;
}

.producto-img-container img{
  width:100%;
  object-fit:contain;
  filter:drop-shadow(0 0 25px #00f0ff);
}

/* ===== POSICIONAR TEXTO EN CUADRO VERDE ===== */
.producto-info{
  position:absolute;
  top:48%; /* Ajusta aquí según tu fondo */
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:380px;
}

.producto-info h1{
  margin:0;
  font-size:26px;
  color:#00f0ff;
  text-shadow:0 0 10px #00f0ff;
}

.producto-info p{
  font-size:15px;
  margin:8px 0;
  text-shadow:0 0 8px rgba(255,255,255,0.7);
}

.producto-info h2{
  font-size:28px;
  color:#00ffcc;
  text-shadow:0 0 12px #00ffcc;
}

/* ===== POSICIONAR BOTÓN EN CUADRO FUCSIA ===== */
.pedir-box{
  position:absolute;
  top:72%; /* Ajusta aquí según tu fondo */
  left:50%;
  transform:translateX(-50%);
}

.btn-pedir{
  padding:14px 45px;
  background:linear-gradient(90deg,#ff00cc,#ff0099);
  color:white;
  font-weight:bold;
  border-radius:40px;
  text-decoration:none;
  font-size:17px;
  box-shadow:0 0 20px #ff00cc;
  transition:0.3s;
}

.btn-pedir:hover{
  transform:scale(1.08);
  box-shadow:0 0 35px #ff00cc;
}

/* ===== ENTREGA Y PAGO DEBAJO ===== */
.beneficios{
  position:absolute;
  top:82%; /* Ajusta aquí para colocarlo justo abajo */
  left:50%;
  transform:translateX(-50%);
  font-size:15px;
  opacity:0.9;
  text-shadow:0 0 10px #00f0ff;
}

/* BOTÓN ATRÁS */
.btn-back{
  position:absolute;
  top:20px;
  left:20px;
  background:#00f0ff;
  color:black;
  padding:8px 15px;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<a href="index.html" class="btn-back">⬅ ATRÁS</a>

<div class="producto-container">

  <!-- 🔵 IMAGEN -->
  <div class="producto-img-box">
    <img id="producto-imagen">
  </div>

  <!-- 🟢 INFO -->
  <div class="producto-info">
    <h1 id="producto-nombre"></h1>
    <p id="producto-descripcion"></p>
    <h2 id="producto-precio"></h2>
  </div>

  <!-- 🟣 PEDIR -->
  <div class="pedir-box">
    <a id="btn-whatsapp" target="_blank" class="btn-pedir">
      PEDIR AHORA
    </a>
  </div>

  <!-- BENEFICIOS -->
  <p class="beneficios">
    🚀 Entrega Express <br>
    💵 Pago Contraentrega
  </p>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
