<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE-LAX Producto</title>

<link rel="stylesheet" href="styles.css">

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:url("img/fondo-producto.jpg") center/cover no-repeat fixed;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
  overflow:hidden;
}

/* Oscurecer fondo elegante */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:-1;
}

/* CONTENEDOR CENTRAL */
.producto-container{
  width:100%;
  max-width:420px;
  text-align:center;
  position:relative;
}

/* 🔵 IMAGEN */
.producto-img-box{
  margin-bottom:30px;
}

.producto-img-box img{
  width:260px;
  max-width:90%;
  display:block;
  margin:auto;
  filter:drop-shadow(0 0 25px #00f0ff);
}

/* 🟢 INFORMACIÓN */
.producto-info{
  margin-bottom:25px;
}

.producto-info h1{
  margin:0 0 10px 0;
  font-size:26px;
  color:#00f0ff;
  text-shadow:
    0 0 10px #00f0ff,
    0 0 25px #00f0ff;
}

.producto-info p{
  font-size:15px;
  margin-bottom:12px;
  color:#ffffff;
  text-shadow:0 0 10px rgba(255,255,255,0.5);
}

.producto-info h2{
  margin:0;
  font-size:32px;
  color:#00ffcc;
  text-shadow:
    0 0 15px #00ffcc,
    0 0 30px #00ffcc;
}

/* 🟣 BOTÓN */
.pedir-box{
  margin-bottom:20px;
}

.btn-pedir{
  display:inline-block;
  padding:16px 50px;
  border-radius:40px;
  background:linear-gradient(90deg,#ff00cc,#ff0099);
  color:white;
  font-weight:bold;
  text-decoration:none;
  font-size:17px;
  box-shadow:
    0 0 20px #ff00cc,
    0 0 40px #ff0099;
  transition:0.3s;
}

.btn-pedir:hover{
  transform:scale(1.08);
  box-shadow:
    0 0 40px #ff00cc,
    0 0 60px #ff0099;
}

/* 🚀 ENTREGA Y PAGO */
.beneficios{
  font-weight:bold;
  font-size:15px;
  color:#ffffff;
  text-shadow:
    0 0 10px #00f0ff,
    0 0 20px #00f0ff;
}

/* BOTÓN ATRÁS */
.btn-back{
  position:fixed;
  top:20px;
  left:20px;
  background:#00f0ff;
  color:black;
  padding:8px 15px;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<a href="index.html" class="btn-back">⬅ ATRÁS</a>

<div class="producto-container">

  <!-- 🔵 IMAGEN -->
  <div class="producto-img-box">
    <img id="producto-imagen">
  </div>

  <!-- 🟢 INFO -->
  <div class="producto-info">
    <h1 id="producto-nombre"></h1>
    <p id="producto-descripcion"></p>
    <h2 id="producto-precio"></h2>
  </div>

  <!-- 🟣 PEDIR -->
  <div class="pedir-box">
    <a id="btn-whatsapp" target="_blank" class="btn-pedir">
      PEDIR AHORA
    </a>
  </div>

  <!-- BENEFICIOS -->
  <p class="beneficios">
    🚀 Entrega Express <br>
    💵 Pago Contraentrega
  </p>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
