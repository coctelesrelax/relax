<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE-LAX Producto</title>

<link rel="stylesheet" href="styles.css">

<style>

/* ===== BODY PRODUCTO ===== */
body.producto-page{
  margin:0;
  height:100vh;
  background:url("img/fondo-producto.jpg") center/cover no-repeat fixed;
  font-family:'Poppins', sans-serif;
  overflow:hidden;
  position:relative;
  color:white;
}

/* Overlay oscuro */
body.producto-page::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:0;
}

/* Botón atrás */
.btn-back{
  position:absolute;
  top:20px;
  left:20px;
  padding:8px 18px;
  border:2px solid #00f0ff;
  color:#00f0ff;
  text-decoration:none;
  font-weight:bold;
  border-radius:25px;
  z-index:5;
}

/* ===== CONTENEDOR CENTRADO PERFECTO ===== */
.producto-container{
  position:absolute;
  top:50%;
  left:54%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;
  max-width:420px;
  z-index:2;
}

/* Imagen */
.producto-img-container{
  margin-bottom:15px;
}

.producto-img-container img{
  width:100%;
  max-height:300px;
  object-fit:contain;
}

/* Info */
.producto-info h1{
  font-size:28px;
  color:#00f0ff;
  text-shadow:0 0 15px #00f0ff;
  margin:10px 0 5px 0;
}

.producto-info p{
  font-size:14px;
  opacity:0.9;
  margin:5px 0;
}

.producto-info h2{
  font-size:34px;
  color:#00ffcc;
  text-shadow:0 0 20px #00ffcc;
  margin:10px 0 20px 0;
}

/* Botón */
.btn-pedir{
  display:inline-block;
  padding:16px 55px;
  background:linear-gradient(90deg,#ff00cc,#00f0ff);
  border-radius:45px;
  font-size:18px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  box-shadow:0 0 30px #ff00cc;
  transition:0.3s;
}

.btn-pedir:hover{
  transform:scale(1.05);
}

/* Beneficios */
.beneficios{
  margin-top:15px;
  font-size:14px;
  text-shadow:0 0 10px #00f0ff;
  opacity:0.9;
}

</style>
</head>

<body class="producto-page">

<a href="index.html" class="btn-back">⬅ ATRÁS</a>

<div class="producto-container">

  <div class="producto-img-container">
    <img id="producto-imagen" alt="Producto RE-LAX">
  </div>

  <div class="producto-info">
    <h1 id="producto-nombre"></h1>
    <p id="producto-descripcion"></p>
    <h2 id="producto-precio"></h2>
  </div>

  <a id="btn-whatsapp" target="_blank" class="btn-pedir">
    PEDIR AHORA
  </a>

  <div class="beneficios">
    🚀 Entrega Express<br>
    💵 Pago Contraentrega
  </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
