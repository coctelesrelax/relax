<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE-LAX Producto</title>

<link rel="stylesheet" href="styles.css">

<style>

/* ===== BODY PRODUCTO ===== */
body.producto-page{
  margin:0;
  height:100vh;
  background:url("img/fondo-producto.jpg") no-repeat center center;
  background-size:cover;
  font-family:'Poppins', sans-serif;
  position:relative;
  overflow:hidden;
  color:white;
}

/* Oscurecer ligeramente */
body.producto-page::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:0;
}

/* CONTENEDOR GENERAL */
.producto-container{
  position:relative;
  width:100%;
  height:100vh;
  z-index:2;
}

/* BOTÓN ATRÁS */
.btn-back{
  position:absolute;
  top:25px;
  left:25px;
  padding:8px 20px;
  border-radius:25px;
  border:2px solid #00f0ff;
  color:#00f0ff;
  text-decoration:none;
  font-weight:bold;
}

/* ===== IMAGEN (MARCO VERDE) ===== */
.producto-img-container{
  position:absolute;
  top:26%;
  left:50%;
  transform:translateX(-50%);
  width:78%;
  max-width:380px;
}

.producto-img-container img{
  width:100%;
  object-fit:contain;
}

/* ===== TEXTO (CENTRO CUADRO) ===== */
.producto-info{
  position:absolute;
  top:58%;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  text-align:center;
}

.producto-info h1{
  font-size:26px;
  color:#00f0ff;
  margin-bottom:5px;
  text-shadow:0 0 15px #00f0ff;
}

.producto-info p{
  font-size:14px;
  opacity:0.9;
  margin-bottom:10px;
}

.producto-info h2{
  font-size:32px;
  color:#00ffcc;
  text-shadow:0 0 20px #00ffcc;
  margin:10px 0;
}

/* ===== BOTÓN (TARIMA FUCSIA) ===== */
.btn-pedir{
  position:absolute;
  top:74%;
  left:50%;
  transform:translateX(-50%);
  padding:15px 55px;
  border-radius:40px;
  background:linear-gradient(90deg,#ff00cc,#00f0ff);
  color:white;
  font-weight:bold;
  text-decoration:none;
  font-size:16px;
}

/* ===== BENEFICIOS ===== */
.beneficios{
  position:absolute;
  top:84%;
  left:50%;
  transform:translateX(-50%);
  font-size:14px;
  text-align:center;
  opacity:0.9;
}

</style>
</head>

<body class="producto-page">

<a href="index.html" class="btn-back">⬅ ATRÁS</a>

<div class="producto-container">

  <div class="producto-img-container">
    <img id="producto-imagen">
  </div>

  <div class="producto-info">
    <h1 id="producto-nombre"></h1>
    <p id="producto-descripcion"></p>
    <h2 id="producto-precio"></h2>
  </div>

  <a id="btn-whatsapp" target="_blank" class="btn-pedir">
    PEDIR AHORA
  </a>

  <div class="beneficios">
    🚀 Entrega Express <br>
    💵 Pago Contraentrega
  </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
