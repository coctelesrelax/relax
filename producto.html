<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE-LAX Producto</title>

<link rel="stylesheet" href="styles.css">

<style>

/* ===== BODY PRODUCTO ===== */
body.producto-page{
  margin:0;
  height:100vh;
  background:url("img/fondo-producto.jpg") center/cover no-repeat fixed;
  font-family:'Poppins', sans-serif;
  position:relative;
  overflow:hidden;
  color:white;
}

/* Overlay */
body.producto-page::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:0;
}

/* Botón atrás */
.btn-back{
  position:absolute;
  top:20px;
  left:20px;
  padding:8px 18px;
  border:2px solid #00f0ff;
  color:#00f0ff;
  text-decoration:none;
  font-weight:bold;
  border-radius:25px;
  z-index:5;
}

/* CONTENEDOR CENTRAL */
.producto-container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:95%;
  max-width:460px;
  text-align:center;
  z-index:2;
}

/* ===============================
   🔵 CUADRO AZUL (IMAGEN)
=================================*/
.cuadro-azul{
  padding:30px;
  border-radius:25px;
  border:3px solid #00f0ff;
  box-shadow:
    0 0 25px #00f0ff,
    0 0 60px rgba(0,255,255,0.5);
  background:rgba(0,0,0,0.6);
  margin-bottom:25px;
}

.cuadro-azul img{
  width:80%;
  max-height:300px;
  object-fit:contain;
}

/* ===============================
   🟢 CUADRO VERDE (INFO)
=================================*/
.cuadro-verde{
  padding:25px;
  border-radius:25px;
  border:3px solid #00ff88;
  box-shadow:
    0 0 25px #00ff88,
    0 0 60px rgba(0,255,136,0.5);
  background:rgba(0,0,0,0.7);
  margin-bottom:25px;
}

.cuadro-verde h1{
  font-size:26px;
  color:#00f0ff;
  text-shadow:0 0 12px #00f0ff;
  margin:0 0 10px 0;
}

.cuadro-verde p{
  font-size:14px;
  opacity:0.9;
  margin:0 0 15px 0;
}

.cuadro-verde h2{
  font-size:32px;
  color:#00ffcc;
  text-shadow:0 0 20px #00ffcc;
  margin:0;
}

/* ===============================
   🟣 BASE FUCSIA (BOTÓN)
=================================*/
.cuadro-fucsia{
  padding:20px;
  border-radius:40px;
  border:3px solid #ff00cc;
  box-shadow:
    0 0 30px #ff00cc,
    0 0 70px rgba(255,0,204,0.6);
  background:rgba(0,0,0,0.65);
  margin-bottom:15px;
}

.btn-pedir{
  display:inline-block;
  padding:14px 45px;
  background:linear-gradient(90deg,#ff00cc,#00f0ff);
  border-radius:40px;
  font-size:17px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  box-shadow:0 0 25px #ff00cc;
  transition:0.3s;
}

.btn-pedir:hover{
  transform:scale(1.05);
}

/* BENEFICIOS */
.beneficios{
  font-size:14px;
  text-shadow:0 0 10px #00f0ff;
  opacity:0.9;
}

</style>
</head>

<body class="producto-page">

<a href="index.html" class="btn-back">⬅ ATRÁS</a>

<div class="producto-container">

  <!-- 🔵 IMAGEN -->
  <div class="cuadro-azul">
    <img id="producto-imagen" alt="Producto RE-LAX">
  </div>

  <!-- 🟢 INFO -->
  <div class="cuadro-verde">
    <h1 id="producto-nombre"></h1>
    <p id="producto-descripcion"></p>
    <h2 id="producto-precio"></h2>
  </div>

  <!-- 🟣 PEDIR -->
  <div class="cuadro-fucsia">
    <a id="btn-whatsapp" target="_blank" class="btn-pedir">
      PEDIR AHORA
    </a>
  </div>

  <!-- BENEFICIOS -->
  <div class="beneficios">
    🚀 Entrega Express<br>
    💵 Pago Contraentrega
  </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
