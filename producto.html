<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE-LAX Producto</title>

<link rel="stylesheet" href="styles.css">

<style>

/* BODY PRODUCTO */
body.producto-page {
  margin:0;
  height:100vh;
  background:url("img/fondo-producto.jpg") center/cover no-repeat fixed;
  color:white;
  font-family:'Poppins', sans-serif;
  overflow:hidden;
  position:relative;
}

/* overlay suave */
body.producto-page::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:0;
}

/* botón ATRÁS */
.btn-back {
  position:absolute;
  top:20px;
  left:20px;
  padding:8px 18px;
  border:2px solid #00f0ff;
  color:#00f0ff;
  text-decoration:none;
  font-weight:bold;
  z-index:2;
}

/* CONTENEDOR */
.producto-container {
  position:relative;
  width:100%;
  height:100vh;
  z-index:1;
}

/* IMAGEN */
.producto-img-container {
  position:absolute;
  top:15%;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  max-width:400px;
}

.producto-img-container img {
  width:100%;
  object-fit:contain;
}

/* INFO TEXTO */
.producto-info {
  position:absolute;
  top:52%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  width:90%;
}

.producto-info h1 {
  font-size:30px;
  color:#00f0ff;
  text-shadow:0 0 15px #00f0ff;
  margin-bottom:8px;
}

.producto-info p {
  font-size:14px;
  opacity:0.9;
  margin-bottom:6px;
}

.producto-info h2 {
  font-size:36px;
  color:#00ffcc;
  text-shadow:0 0 20px #00ffcc;
  margin-top:6px;
}

/* BOTÓN */
.btn-pedir {
  position:absolute;
  top:74%;
  left:50%;
  transform:translateX(-50%);
  padding:16px 56px;
  background:linear-gradient(90deg,#ff00cc,#00f0ff);
  border-radius:45px;
  font-size:18px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  box-shadow:0 0 30px #ff00cc;
}

/* BENEFICIOS */
.beneficios {
  position:absolute;
  top:85%;
  left:50%;
  transform:translateX(-50%);
  font-size:14px;
  opacity:0.9;
  text-shadow:0 0 10px #00f0ff;
}

</style>

</head>
<body class="producto-page">

<a href="index.html" class="btn-back">⬅ ATRÁS</a>

<div class="producto-container">

  <div class="producto-img-container">
    <img id="producto-imagen" alt="Producto RE-LAX">
  </div>

  <div class="producto-info">
    <h1 id="producto-nombre"></h1>
    <p id="producto-descripcion"></p>
    <h2 id="producto-precio"></h2>
  </div>

  <a id="btn-whatsapp" target="_blank" class="btn-pedir">PEDIR AHORA</a>

  <div class="beneficios">
    🚀 Entrega Express <br>
    💵 Pago Contraentrega
  </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
<script src="script.js"></script>

</body>
</html>
