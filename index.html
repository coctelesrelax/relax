<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE-LAX Club</title>
  
<link rel="icon" href="favicon.png">
<link rel="shortcut icon" href="favicon.png">
  
<link rel="stylesheet" href="styles.css">

<style>
body{
  margin:0;
  overflow-x:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:radial-gradient(circle at center,#111,#000);
  color:white;
  text-align:center;
}

/* ===== PARTÍCULAS ===== */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* ===== LOGO ===== */
.logo-wrapper{
  margin-top:40px;
  position:relative;
}

.logo-principal{
  width:220px;
  max-width:80%;
}

.logo-reflejo{
  width:220px;
  max-width:80%;
  transform:scaleY(-1);
  opacity:0.15;
  margin-top:-10px;
  filter:blur(3px);
}

/* ===== PRODUCTOS ===== */
#productos{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:50px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  transition:0.4s;
  border:1px solid rgba(0,255,255,0.3);
}

.card:hover{
  transform:translateY(-12px) scale(1.03);
  box-shadow:0 0 30px #00f0ff;
}

.card img{
  width:100%;
  border-radius:15px;
}

/* BOTONES */
button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00f0ff;
  color:black;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  font-size:22px;
  color:white;
  text-decoration:none;
  box-shadow:0 0 15px #25D366;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="logo-wrapper">
  <img src="img/logo.png" class="logo-principal" alt="RE-LAX Logo" loading="lazy">
  <img src="img/logo.png" class="logo-reflejo" alt="">
</div>

<div id="productos"></div>

<a href="https://wa.me/573132659873" class="whatsapp" target="_blank">💬</a>

<!-- SCRIPTS OPTIMIZADOS -->
<script src="data.js" defer></script>
<script src="script.js" defer></script>

</body>
</html>
