<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE-LAX Club</title>

<link rel="icon" href="favicon.png">
<link rel="shortcut icon" href="favicon.png">

<link rel="stylesheet" href="styles.css">

<style>
body{
  margin:0;
  overflow-x:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:radial-gradient(circle at center,#111,#000);
  color:white;
  text-align:center;
}

/* ===== PARTÍCULAS ===== */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* ===== LOGO ===== */
.logo-wrapper{
  margin-top:40px;
  position:relative;
}

.logo-principal{
  width:220px;
  max-width:80%;
}

.logo-reflejo{
  width:220px;
  max-width:80%;
  transform:scaleY(-1);
  opacity:0.15;
  margin-top:-10px;
  filter:blur(3px);
}

/* ===== PRODUCTOS ===== */
#productos{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:50px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  transition:0.4s;
  border:1px solid rgba(0,255,255,0.3);
}

.card:hover{
  transform:translateY(-12px) scale(1.03);
  box-shadow:0 0 30px #00f0ff;
}

.card img{
  width:100%;
  border-radius:15px;
}

/* 🔥 PRECIO VERDE NEÓN PRO */
.card h4{
  color:#00ff66;
  font-size:22px;
  font-weight:bold;
  text-shadow:0 0 15px #00ff66;
  margin-top:10px;
}

/* BOTONES */
button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00f0ff;
  color:black;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
}

/* ===== TOP VENTAS ===== */
.relax-top{
  padding:60px 20px;
}

.relax-titulo{
  font-size:28px;
  color:#00f0ff;
  margin-bottom:40px;
  text-shadow:0 0 15px #00f0ff;
}

.top-grid{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.top-card{
  width:180px;
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:15px;
  border:1px solid rgba(0,255,255,0.3);
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.top-card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px #00f0ff;
}

.top-card img{
  width:120px;
  height:120px;
  object-fit:contain;
  margin-bottom:10px;
}

.top-price{
  color:#00ff66;
  font-weight:bold;
  text-shadow:0 0 12px #00ff66;
}

/* ===== WHATSAPP ===== */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  font-size:22px;
  color:white;
  text-decoration:none;
  box-shadow:0 0 15px #25D366;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="logo-wrapper">
  <img src="img/logo.png" class="logo-principal" alt="RE-LAX Logo" loading="lazy">
  <img src="img/logo.png" class="logo-reflejo" alt="">
</div>

<div id="productos"></div>

<!-- =========================
     EXPERIENCIA RE-LAX
========================= -->

<section class="relax-experiencia">

  <h2 class="relax-titulo">¿POR QUÉ ELEGIR RE-LAX?</h2>

  <div class="relax-stats">
    <div>
      <h3 class="counter" data-target="352">0</h3>
      <p>Pedidos Entregados</p>
    </div>
    <div>
      <h3 class="counter" data-target="98">0</h3>
      <p>% Clientes Satisfechos</p>
    </div>
    <div>
      <h3 class="counter" data-target="5">0</h3>
      <p>⭐ Calificación Promedio</p>
    </div>
  </div>

</section>

<!-- 🔥 TOP VENTAS AHORA VA AQUÍ (DESPUÉS DEL CONTADOR) -->

<section class="relax-top">

  <h2 class="relax-titulo">🔥 TOP VENTAS RE-LAX</h2>

  <div class="top-grid">

    <div class="top-card">
      <img src="img/gin-selva.png">
      <h3>Gin Selva</h3>
      <span class="top-price">$45.000</span>
    </div>

    <div class="top-card">
      <img src="img/jager-bull.png">
      <h3>Jager Bull</h3>
      <span class="top-price">$42.000</span>
    </div>

    <div class="top-card">
      <img src="img/hechizo-violeta.png">
      <h3>Hechizo Violeta</h3>
      <span class="top-price">$48.000</span>
    </div>

  </div>

</section>

<a href="https://wa.me/573132659873" class="whatsapp" target="_blank">💬</a>

<script src="data.js" defer></script>
<script src="script.js" defer></script>

</body>
</html>
